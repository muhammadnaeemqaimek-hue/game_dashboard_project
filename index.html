<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sports Car Racing Game with Drivers</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-wrapper">
        <!-- Left Side Image (Bacha 1 - Yellow Shirt) -->
        <div class="side-panel left-side">
            <div class="kid-photo" id="leftKid"></div>
        </div>

        <!-- Central Game Container -->
        <div class="game-container">
            <!-- Score Board -->
            <div class="score">Score: <span id="scoreVal">0</span></div>
            
            <!-- Start Screen -->
            <div class="start-screen" id="startScreen">
                <h1>Super Sports Racing</h1>
                <p>Game shuru karne ke liye yahan click karein!</p>
                <p><strong>Controls:</strong> Left & Right Arrow Keys</p>
            </div>

            <!-- Game Area (Road) -->
            <div class="game-area" id="gameArea"></div>
        </div>

        <!-- Right Side Image (Bacha 2 - Blue Shirt) -->
        <div class="side-panel right-side">
            <div class="kid-photo" id="rightKid"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
